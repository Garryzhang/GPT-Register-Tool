<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PayPal 状态机</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1>PayPal 状态机</h1>
          <p id="status">就绪</p>
        </div>
      </header>

      <section class="runtime">
        <div>
          <span>当前节点</span>
          <strong id="stageLabel">未识别</strong>
        </div>
        <div>
          <span>当前卡</span>
          <strong id="cardSummary">无</strong>
        </div>
        <div>
          <span>当前号</span>
          <strong id="phoneSummary">无</strong>
        </div>
      </section>

      <section class="actions">
        <button id="runAll" class="primary" type="button">一键流程</button>
        <button id="step" type="button">执行当前节点</button>
        <button id="fillOtp" type="button">取码并继续</button>
        <button id="togglePanel" type="button">页面浮窗</button>
        <button id="nextCard" type="button">下一个卡</button>
        <button id="nextPhone" type="button">下一个手机号</button>
      </section>

      <section class="timeline">
        <div class="section-title">最近节点</div>
        <ol id="steps"></ol>
      </section>

      <label>备用验证码链接
        <input id="otpUrl" placeholder="https://..." spellcheck="false">
      </label>
      <label>手机号池
        <textarea id="phonePool" placeholder="手机号|验证码链接，每行一条" spellcheck="false"></textarea>
        <small>格式：手机号|验证码链接</small>
      </label>
      <label>卡池
        <textarea id="cardPool" placeholder="卡号|月|年|CVV，每行一条" spellcheck="false"></textarea>
        <small>格式：卡号|月|年|CVV</small>
      </label>

      <footer>
        <button id="save" type="button">保存配置</button>
        <button id="refreshState" type="button">刷新状态</button>
      </footer>
    </main>
    <script src="profile.generated.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
